<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>意念 PDF 工具箱</title>
<style>
:root {
  --bg: #0f172a;
  --sidebar-bg: #1e293b;
  --panel-bg: #1e293b;
  --card-bg: #334155;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --accent: #3b82f6;
  --accent-light: #60a5fa;
  --success: #22c55e;
  --danger: #ef4444;
  --border: #334155;
  --border-light: #475569;
  --radius: 6px;
  --tree-indent: 18px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* ===== TOP BAR ===== */
.topbar {
  height: 52px; background: var(--sidebar-bg); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0;
}
.topbar-brand { font-size: 16px; font-weight: 600; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
.topbar-brand span { font-size: 20px; }
.search-box {
  flex: 1; max-width: 480px; position: relative;
}
.search-box input {
  width: 100%; padding: 8px 12px 8px 36px; background: var(--card-bg); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-size: 13px; outline: none; transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box::before {
  content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 14px; pointer-events: none;
}
.topbar-actions { display: flex; gap: 8px; margin-left: auto; }
.topbar-btn {
  padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--card-bg); color: var(--text); font-size: 12px; cursor: pointer;
  transition: background 0.15s; display: flex; align-items: center; gap: 4px;
}
.topbar-btn:hover { background: var(--border-light); }
.topbar-btn.active { background: var(--accent); border-color: var(--accent); }

/* ===== MAIN LAYOUT ===== */
.main { flex: 1; display: flex; overflow: hidden; }

/* ===== LEFT TREE PANEL ===== */
.tree-panel {
  width: 280px; background: var(--panel-bg); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
}
.tree-header {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; font-size: 11px;
  text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted);
}
.tree-header button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; }
.tree-header button:hover { color: var(--text); }
.tree-content { flex: 1; overflow-y: auto; padding: 8px 0; }

/* Tree nodes */
.tree-node { user-select: none; }
.tree-row {
  display: flex; align-items: center; padding: 4px 16px 4px 0; cursor: pointer;
  font-size: 13px; transition: background 0.1s; white-space: nowrap;
}
.tree-row:hover { background: rgba(255,255,255,0.04); }
.tree-row.active { background: rgba(59,130,246,0.15); color: var(--accent-light); }
.tree-toggle {
  width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--text-muted); transition: transform 0.15s; flex-shrink: 0;
}
.tree-toggle.open { transform: rotate(90deg); }
.tree-toggle.leaf { visibility: hidden; }
.tree-icon { margin-right: 6px; font-size: 14px; flex-shrink: 0; }
.tree-label { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.tree-badge {
  font-size: 10px; padding: 1px 6px; border-radius: 8px;
  background: rgba(255,255,255,0.08); color: var(--text-muted); margin-left: 6px;
}
.tree-children { display: none; }
.tree-children.open { display: block; }
.tree-children .tree-row { padding-left: calc(16px + var(--depth) * var(--tree-indent)); }

/* ===== RIGHT CONTENT ===== */
.content-panel {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
.content-toolbar {
  padding: 12px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.content-toolbar h2 { font-size: 16px; font-weight: 500; flex: 1; }
.content-toolbar .breadcrumb { font-size: 12px; color: var(--text-muted); }
.content-area { flex: 1; overflow-y: auto; padding: 24px; }

/* ===== FILE LIST VIEW ===== */
.view-toggle { display: flex; gap: 2px; background: var(--card-bg); border-radius: var(--radius); padding: 2px; }
.view-btn {
  padding: 4px 10px; border: none; background: none; color: var(--text-muted);
  cursor: pointer; border-radius: 4px; font-size: 13px;
}
.view-btn.active { background: var(--border-light); color: var(--text); }

.list-view { display: none; }
.list-view.active { display: block; }
.list-table { width: 100%; border-collapse: collapse; }
.list-table th {
  text-align: left; padding: 8px 12px; font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-muted); border-bottom: 1px solid var(--border);
  font-weight: 500;
}
.list-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid rgba(71,85,105,0.3); }
.list-table tr { cursor: pointer; transition: background 0.1s; }
.list-table tbody tr:hover { background: rgba(59,130,246,0.08); }
.list-table .fn-name { color: var(--accent-light); font-weight: 500; }
.list-table .fn-desc { color: var(--text-muted); font-size: 12px; }
.list-table .fn-tag {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 10px; background: rgba(59,130,246,0.15); color: var(--accent-light);
}

/* ===== CARD GRID VIEW ===== */
.grid-view { display: none; }
.grid-view.active { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.func-card {
  background: var(--card-bg); border-radius: var(--radius); padding: 18px;
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  border: 1px solid transparent; display: flex; flex-direction: column;
}
.func-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); border-color: var(--accent); }
.func-card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.func-card-icon { font-size: 24px; }
.func-card-name { font-size: 14px; font-weight: 500; }
.func-card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; flex: 1; }
.func-card-meta { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.meta-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: rgba(255,255,255,0.06); color: var(--text-muted); }

/* ===== MODAL ===== */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal {
  background: var(--sidebar-bg); border-radius: 10px; width: 92%; max-width: 600px;
  max-height: 85vh; display: flex; flex-direction: column; border: 1px solid var(--border);
}
.modal-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.modal-header h3 { font-size: 16px; }
.modal-close { background: none; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 9px 11px; background: var(--card-bg); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-size: 13px; outline: none;
}
.form-group input:focus, .form-group select:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 50px; }

.drop-zone {
  border: 2px dashed var(--border); border-radius: var(--radius); padding: 32px 16px;
  text-align: center; cursor: pointer; transition: border-color 0.2s;
}
.drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: rgba(59,130,246,0.05); }
.drop-zone-icon { font-size: 36px; margin-bottom: 8px; }
.drop-zone p { color: var(--text-muted); font-size: 13px; }
.file-list { margin-top: 10px; }
.file-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 10px; background: var(--card-bg); border-radius: 4px;
  margin-bottom: 3px; font-size: 12px;
}
.file-item button { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 15px; }

.btn { padding: 9px 18px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 13px; transition: opacity 0.15s; }
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--accent); color: white; }
.btn-secondary { background: var(--card-bg); color: var(--text); border: 1px solid var(--border); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Progress & Result */
.progress-bar { width: 100%; height: 5px; background: var(--card-bg); border-radius: 3px; overflow: hidden; margin: 10px 0; }
.progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; width: 0%; }
.result-box { margin-top: 14px; padding: 14px; background: var(--card-bg); border-radius: var(--radius); display: none; }
.result-box.show { display: block; }
.result-box pre { white-space: pre-wrap; word-break: break-all; font-size: 12px; color: var(--text-muted); }

/* Footer */
.panel-footer {
  padding: 10px 16px; border-top: 1px solid var(--border); font-size: 11px;
  color: var(--text-muted); display: flex; align-items: center; gap: 8px;
}
.status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; }
.status-dot.online { background: var(--success); }
.status-dot.offline { background: var(--danger); }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Responsive */
@media (max-width: 768px) {
  .tree-panel { width: 220px; }
  .grid-view { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
}
@media (max-width: 600px) {
  .tree-panel { display: none; }
  .content-area { padding: 16px; }
}
</style>
</head>
<body>

<!-- ===== TOP BAR ===== -->
<div class="topbar">
  <div class="topbar-brand"><span>📄</span> WorkBuddy PDF</div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索功能名称、描述..." oninput="handleSearch(this.value)">
  </div>
  <div class="topbar-actions">
    <button class="topbar-btn" onclick="expandAll()">📂 展开全部</button>
    <button class="topbar-btn" onclick="collapseAll()">📁 折叠全部</button>
    <button class="topbar-btn" onclick="location.reload()">🔄</button>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main">

  <!-- Left: File Manager Tree -->
  <div class="tree-panel">
    <div class="tree-header">
      <span>📁 功能目录</span>
      <button onclick="toggleAllNodes()" title="展开/折叠">⊞</button>
    </div>
    <div class="tree-content" id="treeContent"></div>
    <div class="panel-footer">
      <span class="status-dot offline" id="statusDot"></span>
      <span id="statusText">连接中...</span>
    </div>
  </div>

  <!-- Right: Browse Area -->
  <div class="content-panel">
    <div class="content-toolbar">
      <div class="breadcrumb" id="breadcrumb">全部功能</div>
      <h2 id="contentTitle">全部功能</h2>
      <div class="view-toggle">
        <button class="view-btn active" id="btnListView" onclick="setView('list')">☰ 列表</button>
        <button class="view-btn" id="btnGridView" onclick="setView('grid')">▦ 网格</button>
      </div>
    </div>
    <div class="content-area">
      <!-- List View -->
      <div class="list-view active" id="listView">
        <table class="list-table">
          <thead><tr><th>功能</th><th>描述</th><th>输入</th><th>输出</th></tr></thead>
          <tbody id="listBody"></tbody>
        </table>
      </div>
      <!-- Grid View -->
      <div class="grid-view" id="gridView"></div>
      <!-- Empty State -->
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="icon">🔍</div>
        <p>没有找到匹配的功能</p>
      </div>
    </div>
  </div>
</div>

<!-- ===== FUNCTION MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">功能名称</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <p id="modalDesc" style="color:var(--text-muted);font-size:13px;margin-bottom:16px;"></p>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="drop-zone-icon">📁</div>
        <p>拖拽文件到这里，或点击选择</p>
        <input type="file" id="fileInput" multiple style="display:none" onchange="handleFiles(this.files)">
      </div>
      <div class="file-list" id="fileList"></div>
      <div id="paramFields"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="execBtn" onclick="executeFunction()" disabled>执行</button>
    </div>
  </div>
</div>

<!-- ===== RESULT MODAL ===== -->
<div class="modal-overlay" id="resultOverlay">
  <div class="modal" style="max-width:480px;">
    <div class="modal-header">
      <h3>处理结果</h3>
      <button class="modal-close" onclick="closeResult()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <p id="resultStatus" style="font-size:13px;color:var(--text-muted);"></p>
      <div class="result-box" id="resultArea"></div>
    </div>
    <div class="modal-footer" id="resultFooter" style="display:none;">
      <a class="btn btn-primary" id="downloadLink" download="result.pdf">⬇ 下载文件</a>
    </div>
  </div>
</div>

<script>
// ============================================================
// State
// ============================================================
let allFunctions = [];
let categories = {};
let selectedCategory = 'all';
let selectedFiles = [];
let currentFunction = null;
let currentView = 'grid';

const ICONS = {
  merge:'🔗', 'split-pages':'✂️', rotate:'🔄', 'add-password':'🔒', 'img-to-pdf':'🖼️',
  compress:'📦', ocr:'🔍', repair:'🛠️', flatten:'📄', watermark:'💧',
  'remove-pages':'❌', organize:'📑', crop:'📐', scale:'🔎', overlay:'◧',
  'pdf-to-word':'📝', 'pdf-to-img':'🏞️', 'pdf-to-text':'📜', 'pdf-to-csv':'📊',
  'pdf-to-html':'🌐', 'pdf-to-markdown':'📕', 'pdf-to-presentation':'📽️',
  'url-to-pdf':'🔗', 'html-to-pdf':'💻', 'markdown-to-pdf':'📋',
  sanitize:'🧹', 'auto-redact':'🖤', redact:'⬛', 'get-info':'ℹ️',
  'add-page-numbers':'🔢', 'add-image':'🎨', 'add-stamp':'🏅',
  'update-metadata':'📰', 'auto-rename':'🏷️', 'auto-split':'📚',
  'remove-blanks':'📃', 'extract-images':'🖼️', 'remove-password':'🔓',
  'cert-sign':'✍️', 'validate-signature':'✅', 'remove-cert-sign':'🚫',
  'show-javascript':'💻', 'remove-image':'🚫', 'single-page':'📄',
  'multi-layout':'📐', 'split-by-size':'📏', 'split-sections':'📑',
  'split-chapters':'📚', 'pdf-to-xml':'🏷️', 'pdf-to-pdfa':'📦',
  'ebook-to-pdf':'📖', 'file-to-pdf':'📁', 'decompress':'📈',
  'extract-scans':'🔎', 'add-attachments':'📎',
  'filter-size':'📏', 'filter-text':'🔤', 'filter-image':'🖼️',
  'filter-page-size':'📐', 'filter-page-count':'🔢', 'filter-page-rotation':'🔄'
};

const CAT_ICONS = {
  '合并/拆分': '🔗', '页面操作': '📑', '安全': '🔒',
  '转换': '🔄', '优化': '⚡', '筛选': '🔍'
};

// ============================================================
// Init
// ============================================================
async function init() {
  await loadFunctions();
  renderTree();
  renderContent();
  setView(currentView);
  checkStatus();
  setupDragDrop();
}

async function loadFunctions() {
  try {
    const res = await fetch('/api/functions');
    allFunctions = await res.json();
    categories = {};
    allFunctions.forEach(fn => {
      if (!categories[fn.category]) categories[fn.category] = [];
      categories[fn.category].push(fn);
    });
  } catch(e) {
    console.error('Failed to load functions:', e);
    allFunctions = [];
  }
}

async function checkStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    if (data.status === 'online') {
      dot.className = 'status-dot online';
      text.textContent = `${data.functions} 个功能可用`;
    } else {
      dot.className = 'status-dot offline';
      text.textContent = '后端离线';
    }
  } catch(e) {
    document.getElementById('statusDot').className = 'status-dot offline';
    document.getElementById('statusText').textContent = '后端离线';
  }
}

// ============================================================
// Tree Rendering
// ============================================================
function renderTree() {
  const container = document.getElementById('treeContent');
  let html = '';

  // Root: "全部功能"
  html += `<div class="tree-node">`;
  html += `<div class="tree-row ${selectedCategory==='all'?'active':''}" onclick="selectCategory('all')">
    <span class="tree-toggle leaf">▶</span>
    <span class="tree-icon">📋</span>
    <span class="tree-label">全部功能</span>
    <span class="tree-badge">${allFunctions.length}</span>
  </div></div>`;

  // Categories as folders (all expanded by default)
  for (const [cat, fns] of Object.entries(categories)) {
    const icon = CAT_ICONS[cat] || '📁';
    html += `<div class="tree-node">`;
    html += `<div class="tree-row" onclick="toggleTreeNode(this)">
      <span class="tree-toggle">▶</span>
      <span class="tree-icon">${icon}</span>
      <span class="tree-label">${cat}</span>
      <span class="tree-badge">${fns.length}</span>
    </div>`;
    html += `<div class="tree-children open">`;
    fns.forEach(fn => {
      const fnIcon = ICONS[fn.id] || '📄';
      html += `<div class="tree-row ${selectedCategory===cat?'active':''}" onclick="event.stopPropagation(); selectCategory('${cat}'); openFunctionById('${fn.id}')">
        <span class="tree-toggle leaf">▶</span>
        <span class="tree-icon">${fnIcon}</span>
        <span class="tree-label">${fn.name}</span>
      </div>`;
    });
    html += `</div></div>`;
  }

  container.innerHTML = html;
}

function toggleTreeNode(row) {
  const node = row.parentElement;
  const toggle = row.querySelector('.tree-toggle');
  const children = node.querySelector('.tree-children');
  if (!children) return;
  const isOpen = children.classList.contains('open');
  if (isOpen) {
    children.classList.remove('open');
    toggle.classList.remove('open');
  } else {
    children.classList.add('open');
    toggle.classList.add('open');
  }
}

function expandAll() {
  document.querySelectorAll('.tree-children').forEach(el => el.classList.add('open'));
  document.querySelectorAll('.tree-toggle:not(.leaf)').forEach(el => el.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.tree-children').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.tree-toggle:not(.leaf)').forEach(el => el.classList.remove('open'));
}

function toggleAllNodes() {
  const allOpen = document.querySelector('.tree-children.open');
  if (allOpen) collapseAll(); else expandAll();
}

// ============================================================
// Content Rendering
// ============================================================
function selectCategory(cat) {
  selectedCategory = cat;
  const title = cat === 'all' ? '全部功能' : cat;
  document.getElementById('contentTitle').textContent = title;
  document.getElementById('breadcrumb').textContent = title;
  renderTree();
  renderContent();
}

function renderContent() {
  const filtered = selectedCategory === 'all' ? allFunctions : allFunctions.filter(f => f.category === selectedCategory);
  renderListView(filtered);
  renderGridView(filtered);
  document.getElementById('emptyState').style.display = filtered.length === 0 ? 'block' : 'none';
}

function renderListView(fns) {
  const body = document.getElementById('listBody');
  body.innerHTML = fns.map(fn => {
    const icon = ICONS[fn.id] || '📄';
    return `<tr onclick="openFunctionById('${fn.id}')">
      <td><span class="fn-name">${icon} ${fn.name}</span></td>
      <td><span class="fn-desc">${fn.description}</span></td>
      <td>${fn.input_types.map(t => `<span class="fn-tag">${t}</span>`).join(' ')}</td>
      <td><span class="fn-tag">→ ${fn.output_type}</span></td>
    </tr>`;
  }).join('');
}

function renderGridView(fns) {
  const grid = document.getElementById('gridView');
  grid.innerHTML = fns.map(fn => {
    const icon = ICONS[fn.id] || '📄';
    return `<div class="func-card" onclick="openFunctionById('${fn.id}')">
      <div class="func-card-head">
        <span class="func-card-icon">${icon}</span>
        <span class="func-card-name">${fn.name}</span>
      </div>
      <div class="func-card-desc">${fn.description}</div>
      <div class="func-card-meta">
        ${fn.input_types.map(t=>`<span class="meta-tag">${t}</span>`).join('')}
        <span class="meta-tag">→ ${fn.output_type}</span>
      </div>
    </div>`;
  }).join('');
}

function setView(view) {
  currentView = view;
  document.getElementById('listView').classList.toggle('active', view === 'list');
  document.getElementById('gridView').classList.toggle('active', view === 'grid');
  document.getElementById('btnListView').classList.toggle('active', view === 'list');
  document.getElementById('btnGridView').classList.toggle('active', view === 'grid');
}

// ============================================================
// Search
// ============================================================
function handleSearch(query) {
  query = query.toLowerCase().trim();
  if (!query) {
    selectedCategory = 'all';
    document.getElementById('contentTitle').textContent = '全部功能';
    document.getElementById('breadcrumb').textContent = '全部功能';
    renderTree();
    renderContent();
    return;
  }
  // Search across all functions
  const filtered = allFunctions.filter(fn =>
    fn.name.toLowerCase().includes(query) ||
    fn.description.toLowerCase().includes(query) ||
    fn.category.toLowerCase().includes(query) ||
    fn.id.toLowerCase().includes(query)
  );
  document.getElementById('contentTitle').textContent = `搜索结果: "${query}"`;
  document.getElementById('breadcrumb').textContent = `搜索 ${filtered.length} 个结果`;
  renderListView(filtered);
  renderGridView(filtered);
  document.getElementById('emptyState').style.display = filtered.length === 0 ? 'block' : 'none';
}

// ============================================================
// Function Modal
// ============================================================
function openFunctionById(id) {
  currentFunction = allFunctions.find(f => f.id === id);
  if (!currentFunction) return;
  selectedFiles = [];
  document.getElementById('modalTitle').textContent = currentFunction.name;
  document.getElementById('modalDesc').textContent = currentFunction.description;
  document.getElementById('fileList').innerHTML = '';
  document.getElementById('fileInput').value = '';
  renderParamFields();
  updateExecButton();
  document.getElementById('modalOverlay').classList.add('show');
}

function openFunction(id) {
  openFunctionById(id);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function renderParamFields() {
  const container = document.getElementById('paramFields');
  if (!currentFunction || !currentFunction.params || currentFunction.params.length === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = currentFunction.params.map(p => {
    if (p.type === 'select') {
      return `<div class="form-group"><label>${p.name}${p.required?' *':''}</label>
        <select id="param_${p.name}">${p.options.map(o=>`<option>${o}</option>`).join('')}</select></div>`;
    }
    return `<div class="form-group"><label>${p.name}${p.required?' *':''}</label>
      <input type="${p.type==='number'?'number':'text'}" id="param_${p.name}" placeholder="${p.default||''}"></div>`;
  }).join('');
}

function handleFiles(fileList) {
  for (const f of fileList) selectedFiles.push(f);
  renderFileList();
  updateExecButton();
}

function renderFileList() {
  const el = document.getElementById('fileList');
  el.innerHTML = selectedFiles.map((f,i) => `
    <div class="file-item">
      <span>📄 ${f.name} (${(f.size/1024).toFixed(1)}KB)</span>
      <button onclick="removeFile(${i})">×</button>
    </div>
  `).join('');
}

function removeFile(i) {
  selectedFiles.splice(i, 1);
  renderFileList();
  updateExecButton();
}

function updateExecButton() {
  const btn = document.getElementById('execBtn');
  const hasFiles = selectedFiles.length > 0;
  btn.disabled = !hasFiles;
  btn.textContent = hasFiles ? `执行: ${currentFunction?.name}` : '请先选择文件';
}

function setupDragDrop() {
  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });
}

// ============================================================
// Execute Function
// ============================================================
async function executeFunction() {
  if (!currentFunction || selectedFiles.length === 0) return;
  closeModal();
  const resultOverlay = document.getElementById('resultOverlay');
  resultOverlay.classList.add('show');
  const progress = document.getElementById('progressFill');
  const status = document.getElementById('resultStatus');
  const area = document.getElementById('resultArea');
  const footer = document.getElementById('resultFooter');
  progress.style.width = '0%';
  status.textContent = '准备中...';
  area.classList.remove('show');
  footer.style.display = 'none';

  const fd = new FormData();
  selectedFiles.forEach(f => fd.append('file', f));
  if (currentFunction.params) {
    for (const p of currentFunction.params) {
      const el = document.getElementById('param_' + p.name);
      if (el && el.value) fd.append(p.name, el.value);
    }
  }

  try {
    status.textContent = `正在调用: ${currentFunction.endpoint}`;
    progress.style.width = '30%';

    const resp = await fetch(config.spdfUrl + currentFunction.endpoint, {
      method: 'POST', body: fd
    });

    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${errText.substring(0,200)}`);
    }

    progress.style.width = '80%';
    const contentType = resp.headers.get('Content-Type') || '';
    const blob = await resp.blob();

    if (contentType.includes('application/pdf') || contentType.includes('octet-stream')) {
      const url = URL.createObjectURL(blob);
      const dl = document.getElementById('downloadLink');
      dl.href = url; dl.download = 'result.pdf';
      footer.style.display = 'flex';
      status.textContent = `✅ 处理完成！(${(blob.size/1024).toFixed(1)}KB)`;
    } else if (contentType.includes('json')) {
      const data = await blob.text();
      area.innerHTML = `<pre>${JSON.stringify(JSON.parse(data), null, 2)}</pre>`;
    } else {
      const text = await blob.text();
      area.innerHTML = `<pre>${text.substring(0,2000)}</pre>`;
    }
    area.classList.add('show');
    progress.style.width = '100%';

  } catch(e) {
    status.textContent = `❌ 错误: ${e.message}`;
    area.innerHTML = `<pre style="color:var(--danger)">${e.message}</pre>`;
    area.classList.add('show');
  }
}

function closeResult() {
  document.getElementById('resultOverlay').classList.remove('show');
}

// ============================================================
// Config from server
// ============================================================
let config = { spdfUrl: 'http://localhost:8080' };

// Start
init();
</script>
