<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>意念PDF 工具箱</title>
<meta name="description" content="免费在线 PDF 工具集，支持合并、拆分、压缩、水印、OCR 等 80+ 功能">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
<div class="container">

  <!-- ══ 顶部检索功能区 ══ -->
  <header class="top-bar">
    <button class="menu-toggle" onclick="toggleSidebar()" title="目录"><i class="fas fa-bars"></i></button>
    <div class="logo">
      <i class="fas fa-file-pdf"></i>
      <span class="logo-text">意念PDF</span>
      <span class="logo-sub">工具箱</span>
    </div>
    <div class="search-global">
      <i class="fas fa-search"></i>
      <input id="globalSearch" type="text" placeholder="搜索工具或文档..."
             oninput="onSearch(this.value)" autocomplete="off">
      <kbd class="search-kbd">/</kbd>
    </div>
    <div class="top-actions">
      <button class="tbtn" onclick="toggleSortMenu()" title="排序" id="btnSort"><i class="fas fa-sort"></i></button>
      <button class="tbtn" onclick="toggleFilterPanel()" title="筛选" id="btnFilter"><i class="fas fa-filter"></i></button>
      <button class="tbtn active" onclick="setView('grid')" id="btnGrid" title="网格"><i class="fas fa-th-large"></i></button>
      <button class="tbtn" onclick="setView('list')" id="btnList" title="列表"><i class="fas fa-list"></i></button>
    </div>
  </header>

  <!-- ══ 主体三区 ══ -->
  <section class="main">

    <!-- 左侧边栏遮罩（移动端） -->
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

    <!-- ══ 左侧树形结构 ══ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3><i class="fas fa-folder-tree"></i> 功能目录</h3>
        <span class="count-badge" id="toolCount">加载中…</span>
      </div>
      <div class="search-box">
        <input id="treeSearch" type="text" placeholder="筛选功能…"
               oninput="onSearch(this.value)" autocomplete="off">
      </div>
      <div class="tree-wrap" id="treeWrap"></div>
    </aside>

    <div class="splitter-v" id="splitterV"></div>

    <!-- ══ 右侧浏览区 ══ -->
    <main class="preview-area" id="previewArea">

      <!-- 浏览区工具栏 -->
      <div class="preview-toolbar" id="previewToolbar">
        <div class="tool-group">
          <button class="tbtn" onclick="goBack()" title="返回"><i class="fas fa-arrow-left"></i></button>
        </div>
        <div class="tool-sep"></div>
        <div class="tool-group" id="gridViewGroup">
          <button class="tbtn active" onclick="setView('grid')" id="btnGridT" title="网格视图"><i class="fas fa-th-large"></i></button>
          <button class="tbtn" onclick="setView('list')" id="btnListT" title="列表视图"><i class="fas fa-list"></i></button>
        </div>
        <div class="tool-sep"></div>
        <div class="tool-group">
          <button class="tbtn" onclick="toggleSortMenu()" title="排序" id="btnSortT"><i class="fas fa-sort"></i></button>
          <button class="tbtn" onclick="toggleFilterPanel()" title="筛选" id="btnFilterT"><i class="fas fa-filter"></i></button>
        </div>
        <div class="tool-sep"></div>
        <div class="tool-group">
          <button class="tbtn" onclick="uploadFiles()" title="上传文件"><i class="fas fa-upload"></i></button>
        </div>
        <div class="browse-info" id="browseInfo"></div>
      </div>

      <!-- 排序下拉 -->
      <div class="dropdown-menu" id="sortMenu" style="display:none">
        <div class="dropdown-title">排序方式</div>
        <button class="dropdown-item active" data-sort="default" onclick="setSort('default')"><i class="fas fa-check"></i> 默认排序</button>
        <button class="dropdown-item" data-sort="name-asc" onclick="setSort('name-asc')"><i class="fas fa-check"></i> 名称 A→Z</button>
        <button class="dropdown-item" data-sort="name-desc" onclick="setSort('name-desc')"><i class="fas fa-check"></i> 名称 Z→A</button>
      </div>

      <!-- 筛选面板 -->
      <div class="filter-panel" id="filterPanel" style="display:none">
        <div class="filter-title">工具类型</div>
        <label class="filter-check"><input type="checkbox" value="tool" checked onchange="onFilterChange()"> <i class="fas fa-wrench"></i> PDF工具</label>
        <label class="filter-check"><input type="checkbox" value="doc" checked onchange="onFilterChange()"> <i class="fas fa-file-alt"></i> 文档资料</label>
        <label class="filter-check"><input type="checkbox" value="file" checked onchange="onFilterChange()"> <i class="fas fa-folder"></i> 我的文件</label>
      </div>

      <!-- 浏览内容 -->
      <div class="preview-body" id="previewBody">

        <!-- 空状态 -->
        <div class="empty-state" id="emptyState">
          <i class="fas fa-magic"></i>
          <h3>意念PDF 工具箱</h3>
          <p>从左侧选择功能开始使用，支持合并、拆分、压缩、OCR 等 80+ PDF 操作</p>
          <span>按 <kbd>/</kbd> 快速搜索 · <kbd>?</kbd> 查看帮助</span>
        </div>

        <!-- 网格视图 -->
        <div class="grid-view" id="gridView" style="display:none">
          <!-- 动态渲染 -->
        </div>

        <!-- 列表视图 -->
        <div class="list-view" id="listView" style="display:none">
          <!-- 动态渲染 -->
        </div>

        <!-- 工具面板（点击工具后展开） -->
        <div class="tool-panel" id="toolPanel" style="display:none">
          <div class="tool-panel-header">
            <button class="tbtn" onclick="hideToolPanel()"><i class="fas fa-arrow-left"></i></button>
            <h2 id="toolPanelTitle"></h2>
          </div>
          <div class="tool-panel-body" id="toolPanelBody">
            <!-- 动态加载 -->
          </div>
        </div>

      </div><!-- /preview-body -->
    </main>

  </section>

  <!-- 状态栏 -->
  <footer class="status-bar">
    <span id="statusMsg"><i class="fas fa-circle"></i> 就绪</span>
    <span id="statusCount"></span>
    <span id="statusFilter" style="display:none">筛选: 无</span>
    <span style="margin-left:auto" id="statusView">视图: 网格</span>
  </footer>

</div><!-- /container -->

<!-- 移动端底部工具栏 -->
<div class="mobile-bottom-bar" id="mobileBottomBar">
  <div class="mb-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i><span>目录</span></div>
  <div class="mb-btn" onclick="setView('grid')"><i class="fas fa-th-large"></i><span>网格</span></div>
  <div class="mb-btn" onclick="setView('list')"><i class="fas fa-list"></i><span>列表</span></div>
  <div class="mb-btn" onclick="uploadFiles()"><i class="fas fa-upload"></i><span>上传</span></div>
</div>

<!-- 浮动目录按钮 -->
<button class="sidebar-float-toggle" id="sidebarFloatToggle" onclick="toggleSidebar()" title="功能目录">
  <i class="fas fa-folder-tree"></i>
</button>

<!-- 上传弹层 -->
<div class="modal-overlay" id="uploadModal" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <h3><i class="fas fa-upload"></i> 上传文件</h3>
      <button class="modal-close" onclick="closeUploadModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="upload-drop-zone" id="uploadDropZone">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>点击或拖拽上传文件</p>
        <span>支持 PDF、图片、文档</span>
        <input type="file" id="fileInput" multiple accept=".pdf,image/*,.doc,.docx,.txt" hidden>
      </div>
      <div class="upload-file-list" id="uploadFileList"></div>
    </div>
    <div class="modal-footer">
      <button class="mbtn mbtn-cancel" onclick="closeUploadModal()">取消</button>
      <button class="mbtn mbtn-primary" id="uploadConfirmBtn" onclick="confirmUpload()" disabled>确认上传</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 快捷键提示 -->
<div class="shortcut-hint" id="shortcutHint" style="display:none">
  <h4><i class="fas fa-keyboard"></i> 快捷键</h4>
  <div><span>搜索</span><kbd>/</kbd></div>
  <div><span>目录</span><kbd>T</kbd></div>
  <div><span>网格视图</span><kbd>G</kbd></div>
  <div><span>列表视图</span><kbd>L</kbd></div>
  <div><span>上传</span><kbd>U</kbd></div>
  <div><span>帮助</span><kbd>?</kbd></div>
</div>

<!-- 右键菜单 -->
<div id="contextMenu" style="display:none;position:fixed;z-index:9999;min-width:180px;background:rgba(17,26,62,.98);border:1px solid rgba(124,93,252,.3);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.35);padding:6px 0;backdrop-filter:blur(12px)">
  <div class="ctx-item" onclick="ctxAction('run')"><i class="fas fa-play"></i> 启动工具</div>
  <div class="ctx-item" onclick="ctxAction('open')"><i class="fas fa-external-link-alt"></i> 新窗口打开</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxAction('copy')"><i class="fas fa-copy"></i> 复制链接</div>
  <div class="ctx-item" onclick="ctxAction('share')"><i class="fas fa-share"></i> 分享</div>
</div>

<script src="js/app.js"></script>
</body>
</html>
