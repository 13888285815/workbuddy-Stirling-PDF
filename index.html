<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkBuddy PDF 工具箱</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<div id="app" class="app-layout">

  <!-- 顶部工具栏 -->
  <header class="top-toolbar">
    <div class="toolbar-brand">
      <span class="brand-icon">📄</span>
      <span class="brand-name">WorkBuddy PDF</span>
    </div>
    <div class="toolbar-search-wrap">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        id="global-search"
        class="toolbar-search-input"
        placeholder="搜索文件或工具..."
        autocomplete="off"
      >
      <button id="search-clear-btn" class="search-clear-btn" style="display:none" aria-label="清除">✕</button>
    </div>
    <div class="toolbar-actions">
      <button class="toolbar-btn" id="btn-filter" title="筛选">
        <span>🔽</span><span class="btn-label">筛选</span>
        <span class="badge" id="filter-badge" style="display:none">0</span>
      </button>
      <button class="toolbar-btn" id="btn-sort" title="排序">
        <span>↕️</span><span class="btn-label">排序</span>
      </button>
      <button class="toolbar-btn" id="btn-grid" title="网格视图">▦</button>
      <button class="toolbar-btn" id="btn-list" title="列表视图">≡</button>
      <button class="toolbar-btn" id="btn-upload" title="上传文件">⬆️</button>
    </div>
  </header>

  <!-- 主体区域 -->
  <div class="app-body">

    <!-- 左侧边栏 -->
    <aside class="left-sidebar" id="left-sidebar">

      <!-- 侧边栏标签 -->
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="files" id="tab-files">
          <span>📁</span><span>文件</span>
        </button>
        <button class="sidebar-tab" data-tab="tools" id="tab-tools">
          <span>🛠️</span><span>工具</span>
        </button>
      </div>

      <!-- 文件树 -->
      <div class="sidebar-content" id="panel-files">
        <div class="tree-search-wrap">
          <input type="text" id="tree-search" class="tree-search-input" placeholder="过滤文件...">
        </div>
        <div class="tree-container" id="file-tree">
          <div class="tree-empty">暂无文件</div>
        </div>
      </div>

      <!-- 工具目录树 -->
      <div class="sidebar-content" id="panel-tools" style="display:none">
        <div class="tree-search-wrap">
          <input type="text" id="tools-tree-search" class="tree-search-input" placeholder="搜索工具...">
        </div>
        <div class="tree-container" id="tools-tree">
          <!-- 动态渲染 -->
        </div>
      </div>

      <!-- 侧边栏宽度拖拽 -->
      <div class="sidebar-resizer" id="sidebar-resizer"></div>
    </aside>

    <!-- 右侧主内容区 -->
    <main class="main-content" id="main-content">
      <!-- 工具面板（激活工具时覆盖） -->
      <div id="tool-panel" class="tool-panel" style="display:none">
        <div class="panel-header">
          <button class="back-btn" onclick="hideTool()">← 返回</button>
          <h2 id="tool-title">工具名称</h2>
        </div>
        <div id="tool-content" class="panel-content">
          <!-- 动态加载工具内容 -->
        </div>
      </div>

      <!-- 文件浏览区 -->
      <div id="browse-area" class="browse-area">
        <div id="browse-toolbar" class="browse-toolbar">
          <span class="browse-path" id="browse-path">我的文件</span>
          <span class="browse-count" id="browse-count"></span>
        </div>
        <div id="file-grid" class="file-grid">
          <div class="file-grid-empty">
            <div class="empty-icon">📂</div>
            <div class="empty-text">暂无文件</div>
            <div class="empty-hint">点击上方「上传」按钮添加文件</div>
          </div>
        </div>
      </div>
    </main>

  </div><!-- /app-body -->

</div><!-- /app-layout -->

<!-- 排序下拉 -->
<div id="sort-dropdown" class="dropdown-menu" style="display:none">
  <button class="dropdown-item active" data-sort="modified-desc">🕐 最近修改</button>
  <button class="dropdown-item" data-sort="modified-asc">🕐 最早修改</button>
  <button class="dropdown-item" data-sort="name-asc">🔤 名称 A→Z</button>
  <button class="dropdown-item" data-sort="name-desc">🔤 名称 Z→A</button>
  <button class="dropdown-item" data-sort="size-desc">📦 最大优先</button>
  <button class="dropdown-item" data-sort="size-asc">📦 最小优先</button>
</div>

<!-- 筛选面板 -->
<div id="filter-panel" class="dropdown-menu" style="display:none">
  <div class="filter-section">
    <div class="filter-label">文件类型</div>
    <label class="filter-check"><input type="checkbox" value="pdf" checked> PDF</label>
    <label class="filter-check"><input type="checkbox" value="img" checked> 图片</label>
    <label class="filter-check"><input type="checkbox" value="doc" checked> 文档</label>
  </div>
</div>

<!-- 上传 input（隐藏） -->
<input type="file" id="hidden-file-input" multiple accept=".pdf,image/*,.doc,.docx,.txt" style="display:none">

<!-- 加载提示 -->
<div id="loading" class="loading" style="display:none">
  <div class="loading-spinner"></div>
  <p id="loading-text">正在处理...</p>
</div>

<!-- Toast -->
<div id="toast" class="toast" style="display:none"></div>

<!-- 上传确认弹层 -->
<div id="upload-overlay" class="upload-overlay" style="display:none">
  <div class="upload-dialog">
    <div class="upload-dialog-header">上传文件</div>
    <div class="upload-dialog-body" id="upload-dialog-body">
      <div class="upload-drop-zone" id="upload-drop-zone">
        <div class="upload-icon">📁</div>
        <div class="upload-text">点击或拖拽上传文件</div>
        <div class="upload-hint">支持 PDF、图片、文档</div>
      </div>
      <div class="upload-file-list" id="upload-file-list"></div>
    </div>
    <div class="upload-dialog-footer">
      <button class="btn btn-ghost" onclick="closeUploadDialog()">取消</button>
      <button class="btn btn-primary" id="upload-confirm-btn" onclick="confirmUpload()" disabled>确认上传</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
